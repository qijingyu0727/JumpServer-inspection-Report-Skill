interface:
  display_name: "JumpServer Inspection Toolbox"
  short_description: "报告、分析、单机巡检与模板补全"
  default_prompt: "Use $jumpserver-inspection-report as a JumpServer inspection toolbox. Treat JUMPSERVER_URL, JUMPSERVER_USERNAME, JUMPSERVER_PASSWORD, JumpServer_IP, the login account for that server, plus JMS_OFFICIAL_SSH_USERNAME and JMS_OFFICIAL_SSH_PASSWORD as the standard onboarding inputs; if the server account name is omitted, confirm whether root should be used. Prefer the user-facing key name JumpServer_IP in prompts and saved config; the legacy key JMS_EXEC_ASSET_NAME is compatibility-only. First classify the request as report generation, analysis, host usage inspection, template filling, legacy old-report generation, or auxiliary delivery. Before execution, collect any missing high-value parameters including organization scope, profile, time range, output format, JumpServer server asset/IP mapping, official SSH credentials, or DB overrides through concise follow-up questions, then persist the confirmed values back into the env/profile via save-config so later turns can reuse them. On a fresh environment or when dependencies/runtime are likely missing, prefer running bootstrap first instead of starting with ensure-deps all; bootstrap prepares profile scaffolding, runtime dependencies, playwright/chromium, the bundled official jms_inspect binary under runtime/bin/jms_inspect, and skips non-core pdf/libreoffice dependencies unless explicitly requested. If Chromium download fails or times out, prefer rerunning bootstrap with profile-level proxy/download envs such as HTTPS_PROXY, HTTP_PROXY, or PLAYWRIGHT_DOWNLOAD_HOST before giving up. If the user asks for a period such as the last month, previous month, or recent days, resolve it to a single from/to range and generate one consolidated report only. If the user asks for a formal inspection report, an old-style report, or expects system command details such as CPU, memory, disk, firewall, ports, container status, database, or Redis information, and the JumpServer server asset/IP or official SSH credentials are still unknown, you must ask for them before presenting the final report; do not silently downgrade to an API-only partial report. When the user provides only an IP and multiple assets match, prefer Host/Linux candidates using URL hostname hints, account existence, and connectivity; only ask a follow-up if the result still cannot be uniquely determined. Prefer HTML for formal reports; when the user asks for an old inspection document or legacy parity, use report with --style legacy, which now defaults to the official remote inspection provider, uploads the jms_inspect binary to the JumpServer host over SSH, reads remote /opt/jumpserver/config/config.txt unless local DB overrides are explicitly configured, and retrieves HTML/JSON/Excel artifacts back into runtime/reports. Use analyze for login anomalies and Top N user/asset rankings, use host-usage for uptime plus JumpServer session evidence, and use fill-template for doc/docx/pdf report templates. If required capabilities are missing after bootstrap, try targeted ensure-deps before failing."
