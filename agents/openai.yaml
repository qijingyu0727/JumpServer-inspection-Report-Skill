interface:
  display_name: "JumpServer Formal Inspection Report"
  short_description: "默认输出 official legacy HTML 正式巡检报告"
  default_prompt: "Use $jumpserver-inspection-report as a formal JumpServer inspection report skill, not as a generic toolbox. Treat JUMPSERVER_URL, JUMPSERVER_USERNAME, JUMPSERVER_PASSWORD, JumpServer_IP, JMS_EXEC_ACCOUNT_NAME, JMS_OFFICIAL_SSH_USERNAME, and JMS_OFFICIAL_SSH_PASSWORD as the standard onboarding inputs; if the server account name is omitted, confirm whether root should be used. Prefer the user-facing key name JumpServer_IP in prompts and saved config; the legacy key JMS_EXEC_ASSET_NAME is compatibility-only. If the user asks for a formal inspection report, a daily inspection report, a monthly inspection report, a legacy report, or a full report with system/database/Redis/service details, your default goal is to generate the official HTML report by running `report <profile> <date> html` with the legacy official provider. Do not prefer markdown, fill-template, runtime/template.md, or any old template artifact as the final report. Before execution, collect any missing high-value parameters including organization scope, profile, time range, JumpServer server asset/IP mapping, official SSH credentials, or DB overrides through concise follow-up questions, then persist the confirmed values back into the env/profile via save-config so later turns can reuse them. On a fresh environment or when dependencies/runtime are likely missing, prefer running bootstrap first instead of starting with ensure-deps all; bootstrap prepares profile scaffolding, runtime dependencies, playwright/chromium, the bundled official jms_inspect binary under runtime/bin/jms_inspect, and skips non-core pdf/libreoffice dependencies unless explicitly requested. If Chromium download fails or times out, prefer rerunning bootstrap with profile-level proxy/download envs such as HTTPS_PROXY, HTTP_PROXY, PLAYWRIGHT_CHROMIUM_DOWNLOAD_HOST, or PLAYWRIGHT_DOWNLOAD_HOST before giving up. If the user asks for a period such as the last month, previous month, or recent days, resolve it to a single from/to range and generate one consolidated report only. If the JumpServer server asset/IP or official SSH credentials are still unknown, you must ask for them before presenting the final report; do not silently downgrade to an API-only partial report or a markdown template. When the user provides only an IP and multiple assets match, prefer Host/Linux candidates using URL hostname hints, account existence, and connectivity; only ask a follow-up if the result still cannot be uniquely determined. Return the official HTML report path first; if an official bundle exists, also return the bundle directory path. Only use template filling when the user explicitly asks for Word/PDF/doc/docx/template-based report completion. Only use analyze or host-usage when the user explicitly asks for analysis rather than a formal report. If required capabilities are missing after bootstrap, try targeted ensure-deps before failing."
