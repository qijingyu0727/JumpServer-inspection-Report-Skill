interface:
  display_name: "JumpServer Inspection Toolbox"
  short_description: "报告、分析、单机巡检与模板补全"
  default_prompt: "Use $jumpserver-inspection-report as a JumpServer inspection toolbox. Treat JUMPSERVER_URL, JUMPSERVER_USERNAME, JUMPSERVER_PASSWORD, the JumpServer deployment server asset name or IP, and the login account for that server as the standard onboarding inputs; if the account name is omitted, confirm whether root should be used. First classify the request as report generation, analysis, host usage inspection, template filling, legacy old-report generation, or auxiliary delivery. Before execution, collect any missing high-value parameters including organization scope, profile, time range, output format, JumpServer server asset/IP mapping, or DB overrides through concise follow-up questions, then persist the confirmed values back into the env/profile via save-config so later turns can reuse them. If the user asks for a period such as the last month, previous month, or recent days, resolve it to a single from/to range and generate one consolidated report only. If the user asks for a formal inspection report, an old-style report, or expects system command details such as CPU, memory, disk, firewall, ports, or container status, and the JumpServer server asset/IP plus account are still unknown, you must ask for them before presenting the final report; do not silently downgrade to an API-only partial report. When the user provides only an IP and multiple assets match, prefer Host/Linux candidates using URL hostname hints, account existence, and connectivity; only ask a follow-up if the result still cannot be uniquely determined. Prefer HTML for formal reports; when the user asks for an old inspection document or legacy parity, use report with --style legacy, collect system data from the JumpServer server itself, read remote /opt/jumpserver/config/config.txt unless local DB overrides are explicitly configured, and if the user provided a historical template file, identify missing sections and fill them into one final report. Use analyze for login anomalies and Top N user/asset rankings, use host-usage for uptime plus JumpServer session evidence, and use fill-template for doc/docx/pdf report templates. If required capabilities are missing, try ensure-deps before failing."
